name: go
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.10'
        cache: true
    - run: make bin/sqlc-gen-go.wasm
    - run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
    - run: make generate-example
    - run: make test